<!DOCTYPE html>
<html>
<head>
  <title>Rockpaperscissor - ZGS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    .container { margin-top: 80px; }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { transform: scale(1.1); }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .choice-btn {
      font-size: 22px;
      background: white;
      color: black;
    }

    .start-btn { background: #00c9a7; color: white; }
    .restart-btn { background: #ff4d6d; color: white; }

    .hidden { display: none; }

    #result {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    #score {
      font-size: 20px;
      margin-top: 10px;
    }

    #countdown {
      font-size: 40px;
      margin-top: 20px;
      font-weight: bold;
    }

    /* 🔥 effects */
    .glow { box-shadow: 0 0 20px #00ffd5; transform: scale(1.15); }

    .winFlash { animation: winFlash 0.3s; }
    .loseFlash { animation: loseFlash 0.3s; }

    @keyframes winFlash {
      0% { background: #00ffcc; }
      100% { background: linear-gradient(135deg, #1e3c72, #2a5298); }
    }

    @keyframes loseFlash {
      0% { background: #ff4d6d; }
      100% { background: linear-gradient(135deg, #1e3c72, #2a5298); }
    }

    footer {
      margin-top: 100px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🤖 Rock Paper Scissors</h1>

  <!-- Name Screen -->
  <div id="nameScreen">
    <input type="text" id="playerName" placeholder="Enter your name">
    <br><br>
    <button class="start-btn" onclick="startGame()">Start Game</button>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen" class="hidden">
    <h2 id="welcome"></h2>
    <h3 id="round"></h3>

    <div>
      <button id="rockBtn" class="choice-btn" onclick="play('rock')">✊ Rock</button>
      <button id="paperBtn" class="choice-btn" onclick="play('paper')">✋ Paper</button>
      <button id="scissorsBtn" class="choice-btn" onclick="play('scissors')">✌️ Scissors</button>
    </div>

    <div id="countdown"></div>
    <div id="result"></div>
    <div id="score"></div>

    <button class="restart-btn" onclick="restart()">Play Again</button>
  </div>

</div>

<footer>© Garvit 2026</footer>

<script>

let player = "";
let round = 1;
let playerScore = 0;
let aiScore = 0;
let gameOver = false;
let lastMove = "";
let streak = 0;

const winMap = {
  rock: "scissors",
  paper: "rock",
  scissors: "paper"
};

const options = ["rock", "paper", "scissors"];

// START GAME + COUNTDOWN
function startGame() {
  player = document.getElementById("playerName").value.toLowerCase().trim();
  if (!player) return alert("Enter your name!");

  document.getElementById("nameScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");
  document.getElementById("welcome").innerText = "👤 " + player;

  round = 1;
  playerScore = 0;
  aiScore = 0;
  gameOver = false;
  lastMove = "";
  streak = 0;

  disableButtons();
  updateDisplay();

  startGameCountdown();
}

// ⏳ COUNTDOWN ONLY AT START
function startGameCountdown() {
  let count = 3;
  let cd = document.getElementById("countdown");
  cd.innerText = count;

  let interval = setInterval(() => {
    count--;

    if (count > 0) {
      cd.innerText = count;
    } else {
      cd.innerText = "GO!";
      clearInterval(interval);

      setTimeout(() => {
        cd.innerText = "";
        enableButtons();
      }, 600);
    }
  }, 700);
}

// PLAY
function play(userChoice) {
  if (gameOver) return;

  glowBtn(userChoice);

  let aiChoice;

  // 😈 CHEAT
  if (player === "garvitv" || player === "divya") {
    if (userChoice === lastMove) {
      aiChoice = counterMove(userChoice);
    } else {
      aiChoice = winMap[userChoice];
    }
    lastMove = userChoice;
  }

  // 🕵️ SECRET
  else if (player === "paridhi" || player === "pari") {
    if (round === 5) {
      aiChoice = counterMove(userChoice);
    } else if (Math.random() < 0.9) {
      aiChoice = winMap[userChoice];
    } else {
      aiChoice = counterMove(userChoice);
    }
  }

  // 🤖 NORMAL
  else {
    if (Math.random() < 0.35) {
      aiChoice = winMap[userChoice];
    } else {
      aiChoice = counterMove(userChoice);
    }
  }

  // RESULT
  if (winMap[userChoice] === aiChoice) {
    playerScore++;
    streak++;
    showResult("🎉 You Win!", true);
  } else {
    aiScore++;
    streak = 0;
    showResult("😢 AI Wins!", false);
  }

  if (round === 5) {
    finalResult();
    return;
  }

  round++;
  updateDisplay();
}

// EFFECTS
function glowBtn(choice) {
  let btn = document.getElementById(choice + "Btn");
  btn.classList.add("glow");
  setTimeout(() => btn.classList.remove("glow"), 300);
}

function showResult(text, win) {
  document.getElementById("result").innerText = text;
  document.body.classList.add(win ? "winFlash" : "loseFlash");

  setTimeout(() => {
    document.body.classList.remove("winFlash", "loseFlash");
  }, 300);
}

// UTIL
function counterMove(move) {
  if (move === "rock") return "paper";
  if (move === "paper") return "scissors";
  return "rock";
}

function updateDisplay() {
  document.getElementById("round").innerText = `Round ${round}/5`;
  document.getElementById("score").innerText =
    `Score → You: ${playerScore} | AI: ${aiScore}`;
}

function finalResult() {
  gameOver = true;
  disableButtons();

  let text = (playerScore > aiScore)
    ? `🏆 YOU WON (${playerScore}/${aiScore})`
    : `💀 AI WON (${aiScore}/${playerScore})`;

  document.getElementById("result").innerText = text;
}

function disableButtons() {
  rockBtn.disabled = true;
  paperBtn.disabled = true;
  scissorsBtn.disabled = true;
}

function enableButtons() {
  rockBtn.disabled = false;
  paperBtn.disabled = false;
  scissorsBtn.disabled = false;
}

function restart() {
  location.reload();
}

</script>

</body>
</html>
