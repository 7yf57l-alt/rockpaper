<!DOCTYPE html>
<html>
<head>
  <title>Rockpaperscissor - ZGS</title>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    .container {
      margin-top: 80px;
    }

    input {
      padding: 12px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.1);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .choice-btn {
      font-size: 22px;
      background: white;
      color: black;
    }

    .start-btn {
      background: #00c9a7;
      color: white;
    }

    .restart-btn {
      background: #ff4d6d;
      color: white;
    }

    .hidden {
      display: none;
    }

    #result {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    #score {
      font-size: 20px;
      margin-top: 10px;
    }

    footer {
      margin-top: 100px;
      font-size: 14px;
      opacity: 0.8;
    }

/* 📱 MOBILE (phones) */
@media (max-width: 600px) {
  .container {
    margin-top: 40px;
    padding: 10px;
  }

  h1 {
    font-size: 24px;
  }

  button {
    width: 80%;
    font-size: 20px;
  }

  .choice-btn {
    display: block;
    margin: 15px auto;
  }
}

/* 📲 TABLET */
@media (min-width: 601px) and (max-width: 1024px) {
  .container {
    margin-top: 60px;
  }

  button {
    font-size: 22px;
    padding: 14px 24px;
  }
}

/* 🖥️ SMARTBOARD / BIG SCREEN */
@media (min-width: 1025px) {
  h1 {
    font-size: 40px;
  }

  #round {
    font-size: 26px;
  }

  #score {
    font-size: 24px;
  }

  .choice-btn {
    font-size: 28px;
    padding: 18px 30px;
  }
}

/* 🔄 LANDSCAPE MODE (phones turned sideways) */
@media (orientation: landscape) and (max-width: 900px) {
  .choice-btn {
    display: inline-block;
    width: auto;
  }

  .container {
    margin-top: 20px;
  }
}
  </style>
</head>

<body>

<div class="container">

  <h1>🤖 Rock Paper Scissors</h1>

  <!-- Name Screen -->
  <div id="nameScreen">
    <input type="text" id="playerName" placeholder="Enter your name">
    <br><br>
    <button class="start-btn" onclick="startGame()">Start Game</button>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen" class="hidden">
    <h2 id="welcome"></h2>
    <h3 id="round"></h3>

    <div>
      <button id="rockBtn" class="choice-btn" onclick="play('rock')">✊ Rock</button>
      <button id="paperBtn" class="choice-btn" onclick="play('paper')">✋ Paper</button>
      <button id="scissorsBtn" class="choice-btn" onclick="play('scissors')">✌️ Scissors</button>
    </div>

    <div id="result"></div>
    <div id="score"></div>

    <button class="restart-btn" onclick="restart()">Play Again</button>
  </div>

</div>

<footer>
  © Garvit 2026
</footer>

<script>

let player = "";
let round = 1;
let playerScore = 0;
let aiScore = 0;
let gameOver = false;

// SECRET FIXED SEQUENCE 😈
const fixedMoves = ["scissors", "rock", "scissors", "paper", "paper"];

const winMap = {
  rock: "scissors",
  paper: "rock",
  scissors: "paper"
};

// START GAME
function startGame() {
  player = document.getElementById("playerName").value.toLowerCase().trim();

  if (!player) {
    alert("Enter your name!");
    return;
  }

  document.getElementById("nameScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  document.getElementById("welcome").innerText = "👤 " + player;

  round = 1;
  playerScore = 0;
  aiScore = 0;
  gameOver = false;

  enableButtons();
  updateDisplay();
}

// MAIN GAME LOGIC
function play(userChoice) {

  if (gameOver) return;

  let aiChoice;

  // 🎯 CHEAT MODE
  if (player === "garvitv") {
    aiChoice = fixedMoves[round - 1];
  } else {
    aiChoice = smartAI(userChoice);
  }

  // ❌ NO DRAWS
  if (aiChoice === userChoice) {
    aiChoice = counterMove(userChoice);
  }

  // RESULT
  if (winMap[userChoice] === aiChoice) {
    playerScore++;
    document.getElementById("result").innerText = "🎉 You Win!";
  } else {
    aiScore++;
    document.getElementById("result").innerText = "😢 AI Wins!";
  }

  // END CHECK
  if (round === 5) {
    finalResult();
    return;
  }

  round++;
  updateDisplay();
}

// SMART AI 😈
function smartAI(userChoice) {
  const options = ["rock", "paper", "scissors"];

  if (Math.random() < 0.7) {
    return counterMove(userChoice);
  }

  return options[Math.floor(Math.random() * 3)];
}

function counterMove(move) {
  if (move === "rock") return "paper";
  if (move === "paper") return "scissors";
  return "rock";
}

// DISPLAY
function updateDisplay() {
  document.getElementById("round").innerText = `Round ${round}/5`;
  document.getElementById("score").innerText =
    `Score → You: ${playerScore} | AI: ${aiScore}`;
}

// FINAL RESULT
function finalResult() {
  gameOver = true;
  disableButtons();

  let finalText = "";

  if (playerScore > aiScore) {
    finalText = `🏆 YOU WON (${playerScore}/${aiScore})`;
  } else {
    finalText = `💀 AI WON (${aiScore}/${playerScore})`;
  }

  document.getElementById("result").innerText = finalText;
}

// BUTTON CONTROL
function disableButtons() {
  document.getElementById("rockBtn").disabled = true;
  document.getElementById("paperBtn").disabled = true;
  document.getElementById("scissorsBtn").disabled = true;
}

function enableButtons() {
  document.getElementById("rockBtn").disabled = false;
  document.getElementById("paperBtn").disabled = false;
  document.getElementById("scissorsBtn").disabled = false;
}

// RESET
function restart() {
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("nameScreen").classList.remove("hidden");

  document.getElementById("playerName").value = "";
  document.getElementById("result").innerText = "";
}

</script>

</body>
</html>
